<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muğla 1-43 Otobüs Saatleri</title>
    <style>
        :root {
            /* Karanlık Tema Renkleri */
            --primary: #3b82f6; 
            --primary-glow: rgba(59, 130, 246, 0.2);
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --input-bg: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-top: 0;
        }
        .select-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text);
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--primary);
        }
        .next-bus-card {
            background-color: var(--primary-glow);
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-align: center;
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .next-bus-title {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
