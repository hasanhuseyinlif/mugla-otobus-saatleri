<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muğla 1-43 Otobüs Saatleri</title>
    <style>
        :root {
            /* Karanlık Tema Renkleri */
            --primary: #3b82f6; 
            --primary-glow: rgba(59, 130, 246, 0.2);
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --input-bg: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-top: 0;
        }
        .select-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text);
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--primary);
        }
        .next-bus-card {
            background-color: var(--primary-glow);
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-align: center;
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .next-bus-title {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .next-bus-time {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .next-bus-countdown {
            margin-top: 15px;
            font-size: 0.95rem;
            background: var(--primary);
            color: white;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .category-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin: 25px 0 10px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .schedule-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .schedule-list li {
            padding: 14px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
        .schedule-list li:last-child {
            border-bottom: none;
        }
        .badge-next {
            font-size: 0.75rem;
            background-color: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .no-bus-message {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-style: italic;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>1-43 Hat Bilgisi</h1>
    
    <div class="select-group">
        <label for="direction">Yön Seçin</label>
        <select id="direction" onchange="updateUI()">
            <option value="bayir">Bayır Kalkış ➔ Menteşe</option>
            <option value="mentese">Menteşe Stadyum ➔ Bayır</option>
        </select>
    </div>

    <div class="next-bus-card">
        <div class="next-bus-title">Sıradaki Otobüs</div>
        <div class="next-bus-time" id="nextBusTime">--:--</div>
        <div class="next-bus-countdown" id="countdown">Hesaplanıyor...</div>
    </div>

    <div id="scheduleContainer"></div>
</div>

<script>
    // PDF'ten alınan tam saat listesi
    const schedules = {
        'bayir': {
            'weekday': ['07:00', '07:20', '07:35', '07:45', '07:55', '08:05', '08:30', '09:00', '09:30', '10:15', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:35', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:10', '20:10', '22:10'],
            'saturday': ['07:15', '07:35', '08:00', '08:30', '09:15', '10:15', '11:00', '12:00', '12:30', '13:00', '14:00', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:10', '20:10', '22:10'],
            'sunday': ['07:30', '08:00', '08:30', '09:15', '10:15', '11:00', '12:00', '12:30', '13:00', '14:00', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:10', '20:10', '22:10']
        },
        'mentese': {
            'weekday': ['07:40', '08:00', '08:20', '08:40', '09:00', '09:30', '10:00', '10:30', '11:00', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '15:50', '16:15', '16:35', '16:55', '17:15', '17:35', '18:00', '18:30', '19:00', '19:30', '20:10', '21:15', '23:00'],
            'saturday': ['07:40', '08:00', '08:30', '09:15', '10:00', '11:00', '12:00', '13:00', '13:30', '14:00', '15:00', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:10', '21:15', '23:00'],
            'sunday': ['08:00', '08:30', '09:15', '10:00', '11:00', '12:00', '13:00', '13:30', '14:00', '15:00', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:10', '21:15', '23:00']
        }
    };

    function getDayType() {
        const day = new Date().getDay();
        if (day === 0) return 'sunday';
        if (day === 6) return 'saturday';
        return 'weekday';
    }

    function timeToMinutes(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        return hours * 60 + minutes;
    }

    // Saatin hangi kategoriye ait olduğunu bulur
    function getCategory(timeStr) {
        const hour = parseInt(timeStr.split(':')[0], 10);
        if (hour >= 5 && hour < 12) return '🌅 Sabah';
        if (hour >= 12 && hour < 18) return '☀️ Öğleden Sonra';
        return '🌙 Akşam';
    }

    function updateUI() {
        const direction = document.getElementById('direction').value;
        const dayType = getDayType();
        const allTimes = schedules[direction][dayType];
        
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        // SADECE gelecek saatleri filtrele (Gidenleri gizler)
        const futureTimes = allTimes.filter(time => timeToMinutes(time) > currentMinutes);

        const nextBusEl = document.getElementById('nextBusTime');
        const countdownEl = document.getElementById('countdown');
        const containerEl = document.getElementById('scheduleContainer');
        containerEl.innerHTML = ''; // Önceki listeyi temizle

        // Eğer gün içinde başka otobüs kalmadıysa
        if (futureTimes.length === 0) {
            nextBusEl.textContent = "--:--";
            countdownEl.textContent = "Bugün için seferler bitti";
            containerEl.innerHTML = '<div class="no-bus-message">Günün kalan saatlerinde planlanan başka sefer bulunmuyor.</div>';
            return;
        }

        // Sıradaki otobüs bilgilerini güncelle
        const nextTimeStr = futureTimes[0];
        nextBusEl.textContent = nextTimeStr;
        
        const remaining = timeToMinutes(nextTimeStr) - currentMinutes;
        const h = Math.floor(remaining / 60);
        const m = remaining % 60;
        let text = "Kalkışa ";
        if(h > 0) text += h + " saat ";
        text += m + " dakika var";
        countdownEl.textContent = text;

        // Kalan saatleri kategorilerine göre grupla
        const groupedTimes = {};
        futureTimes.forEach(time => {
            const cat = getCategory(time);
            if (!groupedTimes[cat]) groupedTimes[cat] = [];
            groupedTimes[cat].push(time);
        });

        // Gruplanmış listeyi ekrana bas
        let isFirstItem = true;

        for (const [category, timesArray] of Object.entries(groupedTimes)) {
            // Kategori Başlığı Ekle
            const catTitle = document.createElement('div');
            catTitle.className = 'category-title';
            catTitle.textContent = category;
            containerEl.appendChild(catTitle);

            // Kategori İçindeki Saatlerin Listesi
            const ul = document.createElement('ul');
            ul.className = 'schedule-list';

            timesArray.forEach(time => {
                const li = document.createElement('li');
                li.textContent = time;
                
                // Eğer listedeki ilk elemansa (sıradaki otobüs ise) rozet ekle
                if (isFirstItem) {
                    li.style.color = '#ffffff';
                    li.style.fontWeight = 'bold';
                    li.innerHTML += '<span class="badge-next">Sıradaki</span>';
                    isFirstItem = false;
                }

                ul.appendChild(li);
            });

            containerEl.appendChild(ul);
        }
    }

    // İlk yüklemede çalıştır
    updateUI();
    
    // Her 1 dakikada bir (60000ms) sayfayı yenilemeden saatleri güncelle
    setInterval(updateUI, 60000);
</script>

</body>
</html>
