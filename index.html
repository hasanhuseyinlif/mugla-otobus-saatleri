<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muğla 1-43 Otobüs Saatleri</title>
    <style>
        :root {
            /* Daha Belirgin Koyu Tema Renkleri */
            --primary: #3b82f6; 
            --primary-glow: rgba(59, 130, 246, 0.2);
            --bg: #111827; /* Koyu Lacivert/Gri Arka Plan */
            --card-bg: #1f2937; /* Daha Açık Kutu Rengi */
            --text: #f9fafb; /* Tam Beyaz Metin */
            --text-muted: #9ca3af;
            --border: #4b5563;
            --input-bg: #374151;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-top: 0;
        }
        .select-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text);
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--primary);
        }
        .next-bus-card {
            background-color: var(--primary-glow);
            border: 1px solid rgba(59, 130, 246, 0.4);
            text-align: center;
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .next-bus-title {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .next-bus-time {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .next-bus-countdown {
            margin-top: 15px;
            font-size: 0.95rem;
            background: var(--primary);
            color: white;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .category-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin: 25px 0 10px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .schedule-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .schedule-list li {
            padding: 14px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
        .schedule-list li:last-child {
            border-bottom: none;
        }
        .badge-next {
            font-size: 0.75rem;
            background-color: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .no-bus-message {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-style: italic;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
